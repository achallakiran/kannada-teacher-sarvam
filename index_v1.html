<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಕನ್ನಡ Reading Companion — Class 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --saffron:      #E8751A;
  --deep-saffron: #C4581A;
  --turmeric:     #F5A623;
  --cream:        #FDF6E8;
  --parchment:    #F5E8C8;
  --brown:        #5C3D1E;
  --dark-brown:   #2C1810;
  --lotus:        #D4566E;
  --teal:         #2A7D6E;
  --shadow:       rgba(44,24,16,0.14);
  --speak-idle:   #3B6FD4;
  --speak-bg:     #EEF2FC;
  --speak-active: #2A9D5C;
  --radius:       14px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Lora', serif;
  background: var(--cream);
  color: var(--dark-brown);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 8% 0%,    rgba(232,117,26,.07) 0%, transparent 55%),
    radial-gradient(ellipse at 92% 100%, rgba(212,86,110,.05) 0%, transparent 55%);
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.app-header {
  background: linear-gradient(135deg, var(--brown) 0%, var(--dark-brown) 65%, #150805 100%);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,.32);
  position: sticky;
  top: 0;
  z-index: 100;
}
.app-header::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(90deg,transparent,transparent 40px,
    rgba(232,117,26,.055) 40px,rgba(232,117,26,.055) 41px);
  pointer-events:none;
}
.hdr-icon { font-size:2rem; position:relative; z-index:1; flex-shrink:0; }
.hdr-text { position:relative; z-index:1; flex:1; min-width:0; }
.hdr-text h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(.82rem, 2vw, 1.05rem);
  color: var(--turmeric);
  letter-spacing: .04em;
  line-height: 1.25;
}
.hdr-text p {
  font-size:.72rem; color:rgba(245,166,35,.55);
  letter-spacing:.08em; text-transform:uppercase; margin-top:2px;
}
.hdr-right {
  position:relative; z-index:1;
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.hdr-badge {
  background:rgba(232,117,26,.18); border:1px solid rgba(232,117,26,.38);
  border-radius:20px; padding:4px 12px; font-size:.72rem; color:var(--turmeric);
}
.api-pill {
  border-radius:20px; padding:4px 10px; font-size:.7rem;
  display:flex; align-items:center; gap:5px; white-space:nowrap;
  background:rgba(42,157,92,.18); color:#7FDBA8; border:1px solid rgba(42,157,92,.3);
}
.api-dot {
  width:6px; height:6px; border-radius:50%;
  background:currentColor; flex-shrink:0;
  animation:blink 2.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ══════════════════════════════════════
   VOICE BAR
══════════════════════════════════════ */
.voice-bar {
  background: white;
  border-bottom: 1px solid var(--parchment);
  padding: 9px 32px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  box-shadow: 0 2px 8px rgba(44,24,16,.05);
}
.vbar-label {
  font-size:.7rem; text-transform:uppercase;
  letter-spacing:.1em; color:#9A7A5A; font-weight:700; white-space:nowrap;
}
.vbar-group { display:flex; align-items:center; gap:6px; }
.vbar-group label { font-size:.73rem; color:#9A7A5A; white-space:nowrap; }
.vbar-select {
  font-family:'Lora',serif; font-size:.76rem;
  border:1px solid var(--parchment); border-radius:7px; padding:4px 8px;
  color:var(--dark-brown); background:var(--cream); outline:none; cursor:pointer;
}
.vbar-range { width:80px; accent-color:var(--saffron); }
.vbar-val   { font-size:.72rem; color:var(--saffron); font-weight:700; min-width:30px; }
.stop-btn {
  background:#FFF0F0; border:1px solid #FFCCCC; border-radius:8px;
  padding:4px 12px; font-size:.74rem; color:#CC4444;
  cursor:pointer; font-family:'Lora',serif; font-weight:700;
  transition:background .2s; white-space:nowrap;
}
.stop-btn:hover { background:#FFE0E0; }
#cacheInfo { font-size:.7rem; color:#9A7A5A; }
.clear-btn  { font-size:.68rem; color:#CC4444; background:none; border:none; cursor:pointer; padding:0 3px; }

/* ══════════════════════════════════════
   CONTAINER & TABS
══════════════════════════════════════ */
.container { max-width:1080px; margin:0 auto; padding:26px 20px 70px; }

.chapter-nav { display:flex; gap:9px; flex-wrap:wrap; margin-bottom:26px; align-items:center; }
.ch-nav-label {
  font-size:.7rem; text-transform:uppercase; letter-spacing:.1em;
  color:var(--saffron); font-weight:700; margin-right:2px;
}
.ch-tab {
  background:white; border:2px solid var(--parchment); border-radius:50px;
  padding:7px 18px; font-size:.8rem; color:var(--brown); cursor:pointer;
  font-family:'Lora',serif; font-weight:600; transition:all .2s;
  box-shadow:0 2px 6px var(--shadow);
}
.ch-tab:hover  { border-color:var(--saffron); color:var(--saffron); transform:translateY(-1px); }
.ch-tab.active {
  background:linear-gradient(135deg,var(--saffron),var(--deep-saffron));
  border-color:var(--deep-saffron); color:white;
  box-shadow:0 4px 14px rgba(232,117,26,.33);
}
.add-ch-btn {
  background:white; border:2px dashed var(--parchment); border-radius:50px;
  padding:7px 16px; font-size:.78rem; color:#C0A080; cursor:pointer;
  font-family:'Lora',serif; transition:all .2s;
}
.add-ch-btn:hover { border-color:var(--saffron); color:var(--saffron); }

/* ══════════════════════════════════════
   CHAPTER HEADER
══════════════════════════════════════ */
.ch-header {
  background: linear-gradient(135deg, var(--brown) 0%, #3A1E0E 100%);
  border-radius:16px; padding:26px 30px; margin-bottom:22px;
  position:relative; overflow:hidden;
  box-shadow:0 6px 24px rgba(44,24,16,.24);
}
.ch-header::after {
  content:'📖'; position:absolute; right:22px; bottom:8px;
  font-size:4.8rem; opacity:.07; pointer-events:none;
}
.ch-num      { font-size:.7rem; text-transform:uppercase; letter-spacing:.14em; color:rgba(245,166,35,.55); margin-bottom:5px; }
.ch-title-kn { font-family:'Noto Sans Kannada',sans-serif; font-size:1.75rem; font-weight:700; color:var(--turmeric); line-height:1.3; }
.ch-title-en { font-size:.95rem; color:rgba(253,246,232,.65); font-style:italic; margin-top:3px; }

/* ══════════════════════════════════════
   SECTION CARDS
══════════════════════════════════════ */
.sec-card {
  background:white; border-radius:var(--radius); margin-bottom:18px;
  box-shadow:0 3px 14px var(--shadow); border:1px solid rgba(232,117,26,.09);
  overflow:hidden; animation:fadeUp .38s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.sec-hdr {
  display:flex; align-items:center; gap:13px; padding:15px 20px;
  cursor:pointer; user-select:none;
  border-bottom:1px solid transparent; transition:background .18s;
}
.sec-hdr:hover { background:rgba(232,117,26,.04); }
.sec-hdr.open  { border-bottom-color:var(--parchment); }

.sec-icon { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.ic-vocab  { background:linear-gradient(135deg,#FFF0DC,#FFD9A0); }
.ic-short  { background:linear-gradient(135deg,#DCF0E8,#A0D9B8); }
.ic-detail { background:linear-gradient(135deg,#DCE8FF,#A0B8F0); }
.ic-fill   { background:linear-gradient(135deg,#F0DCF0,#D9A0D9); }
.ic-form   { background:linear-gradient(135deg,#FFE8DC,#F0A880); }

.sec-titles   { flex:1; }
.sec-title-kn { font-family:'Noto Sans Kannada',sans-serif; font-size:.92rem; font-weight:600; color:var(--dark-brown); }
.sec-title-en { font-size:.72rem; color:#9B7A5A; margin-top:1px; }
.sec-count    { font-size:.7rem; background:var(--parchment); color:var(--brown); border-radius:12px; padding:3px 10px; font-weight:600; }
.sec-chevron  { font-size:.75rem; color:#C0A080; transition:transform .28s ease; }
.sec-hdr.open .sec-chevron { transform:rotate(180deg); }

.sec-body { display:none; padding:16px 20px 20px; }
.sec-body.open { display:block; }

/* ══════════════════════════════════════
   SPEAK BUTTON  (Kannada only)
══════════════════════════════════════ */
.speak-btn {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--speak-bg); border:1.5px solid rgba(59,111,212,.22);
  border-radius:22px; padding:4px 11px;
  font-size:.7rem; font-weight:700; color:var(--speak-idle);
  cursor:pointer; font-family:'Lora',serif;
  transition:all .18s; white-space:nowrap; flex-shrink:0; line-height:1.4;
}
.speak-btn:hover    { background:#D8E4FC; border-color:rgba(59,111,212,.45); }
.speak-btn:disabled { opacity:.45; cursor:not-allowed; }

.speak-btn.loading {
  color:#8A6A30; background:#FFF8DC; border-color:rgba(200,150,30,.35);
  animation:loadpulse .9s ease-in-out infinite;
}
@keyframes loadpulse { 0%,100%{opacity:1} 50%{opacity:.5} }

.speak-btn.playing {
  background:linear-gradient(135deg,#E8F5EE,#C5EDD8);
  border-color:rgba(42,157,92,.4); color:var(--speak-active);
  animation:playglow 1.1s ease-in-out infinite;
}
@keyframes playglow { 0%,100%{box-shadow:0 0 0 0 rgba(42,157,92,.3)} 50%{box-shadow:0 0 0 5px rgba(42,157,92,0)} }

.speak-btn.err { background:#FFF0F0; border-color:rgba(200,60,60,.3); color:#CC4444; }

.card-active { outline:2px solid var(--speak-active); outline-offset:2px; border-radius:var(--radius); }

/* ══════════════════════════════════════
   VOCAB
══════════════════════════════════════ */
.vocab-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:11px; }
.vocab-card {
  background:var(--cream); border-radius:11px; padding:13px 15px;
  border-left:4px solid var(--turmeric);
  transition:transform .18s,box-shadow .18s;
}
.vocab-card:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(232,117,26,.14); }
.vocab-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:7px; }
.vocab-num { font-size:.62rem; color:var(--saffron); font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
.vocab-kn  { font-family:'Noto Sans Kannada',sans-serif; font-size:1.02rem; font-weight:600; color:var(--dark-brown); margin-bottom:2px; }
.vocab-tr  { font-size:.76rem; color:#8A6A4A; font-style:italic; margin-bottom:5px; }
.vocab-en  { font-size:.8rem; font-weight:600; color:var(--teal); background:rgba(42,125,110,.09); display:inline-block; padding:2px 8px; border-radius:6px; }

/* ══════════════════════════════════════
   Q & A
══════════════════════════════════════ */
.qa-item { border-radius:11px; margin-bottom:13px; overflow:hidden; border:1px solid var(--parchment); }
.qa-item:last-child { margin-bottom:0; }
.qa-q-block { background:var(--parchment); padding:12px 15px; }
.qa-q-top   { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:4px; }
.qa-q-label { font-size:.62rem; text-transform:uppercase; letter-spacing:.1em; color:var(--saffron); font-weight:700; }
.qa-kn      { font-family:'Noto Sans Kannada',sans-serif; font-size:.98rem; font-weight:600; color:var(--dark-brown); line-height:1.5; }
.qa-tr      { font-size:.74rem; color:#9A7A5A; font-style:italic; margin-top:3px; }
.qa-en      { font-size:.8rem; color:var(--teal); font-weight:600; margin-top:3px; }
.qa-a-block { background:white; padding:12px 15px; }
.qa-a-top   { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:4px; }
.qa-a-label { font-size:.62rem; text-transform:uppercase; letter-spacing:.1em; color:var(--teal); font-weight:700; }
.qa-ans-kn  { font-family:'Noto Sans Kannada',sans-serif; font-size:.95rem; color:var(--dark-brown); line-height:1.5; }
.qa-ans-tr  { font-size:.74rem; color:#9A7A5A; font-style:italic; margin-top:3px; }
.qa-ans-en  { font-size:.78rem; color:#4A7D6E; margin-top:3px; font-style:italic; }

/* ══════════════════════════════════════
   FILL IN BLANKS
══════════════════════════════════════ */
.fill-list { list-style:none; }
.fill-item { display:flex; gap:13px; align-items:flex-start; padding:11px 0; border-bottom:1px solid var(--parchment); }
.fill-item:last-child { border-bottom:none; }
.fill-num  { background:var(--saffron); color:white; border-radius:50%; width:25px; height:25px; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; flex-shrink:0; margin-top:2px; }
.fill-body { flex:1; }
.fill-top  { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:3px; }
.fill-kn   { font-family:'Noto Sans Kannada',sans-serif; font-size:.98rem; font-weight:600; color:var(--dark-brown); }
.fill-kn u { text-underline-offset:3px; text-decoration-color:var(--saffron); color:var(--deep-saffron); }
.fill-tr   { font-size:.74rem; color:#9A7A5A; font-style:italic; margin-top:2px; }
.fill-en   { font-size:.78rem; color:var(--teal); font-weight:600; margin-top:2px; }

/* ══════════════════════════════════════
   WORD FORM
══════════════════════════════════════ */
.wf-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:11px; }
.wf-card {
  background:var(--cream); border-radius:11px; padding:13px 15px;
  text-align:center; border:2px solid var(--parchment);
  transition:all .18s; position:relative;
}
.wf-card:hover { border-color:var(--turmeric); box-shadow:0 4px 14px rgba(245,166,35,.14); transform:translateY(-2px); }
.wf-speak { position:absolute; top:9px; right:9px; }
.wf-word  { font-family:'Noto Sans Kannada',sans-serif; font-size:1.12rem; font-weight:700; color:var(--dark-brown); margin:8px 0 3px; }
.wf-hl    { color:var(--lotus); font-weight:700; }
.wf-tr    { font-size:.74rem; color:#9A7A5A; font-style:italic; margin-bottom:6px; }
.wf-mean  { font-size:.78rem; font-weight:600; color:var(--teal); background:rgba(42,125,110,.1); border-radius:6px; padding:2px 8px; display:inline-block; }

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:600px){
  .app-header { padding:14px 16px; }
  .voice-bar  { padding:9px 16px; }
  .container  { padding:16px 12px 56px; }
  .vocab-grid, .wf-grid { grid-template-columns:1fr; }
  .ch-title-kn { font-size:1.3rem; }
  .hdr-badge { display:none; }
}
</style>
</head>

<!-- ══════════════════════════
     HEADER
══════════════════════════ -->
<header class="app-header">
  <div class="hdr-icon">🪔</div>
  <div class="hdr-text">
    <h1>Kannada Reading Companion</h1>
    <p>Class 2 · Exam Revision · Sarvam Voice &nbsp;·&nbsp; <span style="color:#F5A623;font-weight:700;letter-spacing:.05em;">v3.0</span></p>

    <div class="api-pill">

</header>

<!-- ══════════════════════════

<div class="voice-bar">

<div class="container">

  <!-- DEBUG / TEST PANEL -->
  <div id="debugPanel" style="
      background:#1C0F07;color:#A0D0A0;font-family:monospace;font-size:.7rem;
      border-radius:10px;padding:12px 14px;margin-bottom:16px;

<script>
/* ══════════════════════════════════════════════════════
   VERSION & PROXY
══════════════════════════════════════════════════════ */
const VERSION   = 'v2.1';
const PROXY_URL = 'https://sarvam-kn-proxy.achallakiran.workers.dev';

/* ══════════════════════════════════════════════════════
   CONNECTION TEST  — hit the ▶ Run Connection Test button
══════════════════════════════════════════════════════ */
async function runConnectionTest() {
  dbg('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  dbg('CONNECTION TEST  ' + VERSION);
  dbg('Worker URL: ' + PROXY_URL);
  dbg('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');

  // Step 1: Can we reach the worker at all?
  dbg('STEP 1 — Pinging Worker with OPTIONS preflight…');
  try {
    const ping = await fetch(PROXY_URL, {
      method: 'OPTIONS',
      mode: 'cors',
    });
    dbg('✓ Worker reachable — OPTIONS status: ' + ping.status);
    const acao = ping.headers.get('access-control-allow-origin');
    dbg('  Access-Control-Allow-Origin: ' + (acao || '(missing — CORS not configured!)'));
  } catch(e) {
    dbg('✗ Cannot reach Worker at all!');
    dbg('  Error: ' + e.message);
    dbg('  → Check Worker is deployed at the URL above');
    return;
  }

  // Step 2: POST a real TTS request
  dbg('');
  dbg('STEP 2 — Sending test TTS request (text: ಹಾ)…');
  let res, rawText;

  } catch(e) {
    dbg('✗ Fetch failed: ' + e.message);
    dbg('  → This is a CORS or network block.');
    dbg('  → Re-deploy your Cloudflare Worker with the new code.');
    return;
  }

  // Step 3: Parse and play
  dbg('');
  dbg('STEP 3 — Parsing response…');
  let data;
  try { data = JSON.parse(rawText); } catch(_) {
    dbg('✗ Response is not valid JSON');
    return;
  }

  if (data.audios && data.audios[0]) {

    dbg('  → Go to dashboard.sarvam.ai and generate a fresh key.');

const logs = [];
function dbg(...args) {
  const msg = args.map(a =>
    typeof a === 'object' ? JSON.stringify(a) : String(a)
  ).join(' ');
  console.log('[KN]', msg);
  logs.unshift(msg);
  if (logs.length > 6) logs.pop();
  const el = document.getElementById('debugLog');
  if (el) el.textContent = logs.join('\n');
}

/* ══════════════════════════════════════════════════════
   SARVAM TTS ENGINE
══════════════════════════════════════════════════════ */
let audioCache   = {};   // text → base64 wav
let currentAudio = null;
let currentBtn   = null;
let currentCard  = null;

async function sarvamTTS(text) {
  const speaker = document.getElementById('speakerSel').value;
  const pace    = parseFloat(document.getElementById('paceRange').value);

  dbg('→ Fetching TTS for:', text.substring(0, 30));

  let res;
  try {
    res = await fetch(PROXY_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        target_language_code: 'kn-IN',
        speaker,
        model: 'bulbul:v3',
        pace,
        speech_sample_rate: 24000,
      })
    });
  } catch(networkErr) {
    dbg('✗ Network error:', networkErr.message);
    throw new Error('Network error — check internet connection');
  }

  dbg('← HTTP status:', res.status);

  // Read the raw text first so we can log it on failure
  const rawText = await res.text();
  dbg('← Raw response (first 120):', rawText.substring(0, 120));

  if (!res.ok) {
    // Try to parse error message from Sarvam's response
    let errMsg = `HTTP ${res.status}`;
    try {
      const errJson = JSON.parse(rawText);
      // Sarvam wraps errors in different shapes — handle all of them
      errMsg = errJson.message
            || errJson.error
            || errJson.detail
            || (typeof errJson === 'string' ? errJson : errMsg);
      // Flatten object errors
      if (typeof errMsg === 'object') errMsg = JSON.stringify(errMsg);
    } catch(_) { /* rawText wasn't JSON, use status code */ }
    throw new Error(errMsg);
  }

  let data;
  try {
    data = JSON.parse(rawText);
  } catch(_) {
    throw new Error('Response was not valid JSON');
  }

  if (!data.audios || !data.audios[0]) {
    dbg('✗ No audios in response. Keys:', Object.keys(data).join(', '));
    throw new Error('No audio returned — check Worker logs');
  }

  dbg('✓ Got audio, base64 length:', data.audios[0].length);
  return data.audios[0]; // base64 wav
}

async function playBase64(b64) {
  stopAudio();
  // Decode base64 → Uint8Array → Blob → Object URL
  // This avoids the data-URI size limit in some browsers
  const binary = atob(b64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'audio/wav' });
  const url  = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.onended = () => URL.revokeObjectURL(url);
  currentAudio = audio;
  try {
    await audio.play();
  } catch(playErr) {
    dbg('✗ audio.play() failed:', playErr.message);
    URL.revokeObjectURL(url);
    throw new Error('Browser blocked autoplay — tap the page first');
  }
  return audio;
}

function stopAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (currentBtn)   {
    currentBtn.classList.remove('loading','playing','err');
    currentBtn.innerHTML = '🔊 Speak';
    currentBtn = null;
  }
  if (currentCard)  { currentCard.classList.remove('card-active'); currentCard = null; }
}

async function speakKannada(text, btn, card) {
  // Toggle off if same button tapped again
  if (currentBtn === btn) { stopAudio(); return; }

  stopAudio();
  currentBtn  = btn;
  currentCard = card || null;

  btn.classList.add('loading');
  btn.innerHTML = '⏳ Loading…';
  btn.disabled  = true;
  if (card) card.classList.add('card-active');

  try {
    if (!audioCache[text]) {
      audioCache[text] = await sarvamTTS(text);
      updateCacheCount();
    }

    btn.classList.remove('loading');
    btn.classList.add('playing');
    btn.innerHTML = '🔊 Playing…';
    btn.disabled  = false;

    const audio = await playBase64(audioCache[text]);

    audio.onended = () => { if (currentBtn === btn) stopAudio(); };
    audio.onerror = (e) => {
      dbg('✗ Audio element error:', e);
      if (currentBtn === btn) {
        btn.classList.remove('playing');
        btn.classList.add('err');
        btn.innerHTML = '⚠️ Playback error';
        btn.disabled  = false;
        setTimeout(() => {
          btn.classList.remove('err');
          btn.innerHTML = '🔊 Speak';
          if (card) card.classList.remove('card-active');
          currentBtn = null; currentCard = null;
        }, 2500);
      }
    };

  } catch(e) {
    dbg('✗ speakKannada caught:', e.message);
    btn.classList.remove('loading');
    btn.classList.add('err');
    // Show the actual message, truncated cleanly
    const msg = e.message || 'Unknown error';
    btn.innerHTML = '⚠️ ' + msg.substring(0, 30);
    btn.disabled  = false;
    if (card) card.classList.remove('card-active');
    currentBtn = null; currentCard = null;
    setTimeout(() => {
      btn.classList.remove('err');
      btn.innerHTML = '🔊 Speak';
    }, 4000);
  }
}

function updateCacheCount() {
  const n = Object.keys(audioCache).length;
  document.getElementById('cacheInfo').textContent = n + ' clip' + (n!==1?'s':'');
}
function clearCache() { stopAudio(); audioCache = {}; updateCacheCount(); }

/* ══════════════════════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════════════════════ */
let activeId = CHAPTERS[0].id;
const REFS   = {};  // domId → speakText
let   refN   = 0;
const mkRef  = t => { const id='r'+(refN++); REFS[id]=t; return id; };

function renderTabs() {
  document.getElementById('chapterTabs').innerHTML =
    CHAPTERS.map(ch =>
      `<button class="ch-tab${ch.id===activeId?' active':''}"
               onclick="switchChapter('${ch.id}')">
         ${ch.number}
       </button>`
    ).join('');
}

function switchChapter(id) {
  stopAudio();
  activeId = id;
  renderTabs();
  renderContent();
}

function renderContent() {
  const ch = CHAPTERS.find(c => c.id === activeId);
  const el = document.getElementById('chapterContent');
  if (!ch) { el.innerHTML=''; return; }

  el.innerHTML =
    `<div class="ch-header">
       <div class="ch-num">${ch.number}</div>
       <div class="ch-title-kn">${ch.titleKannada}</div>
       <div class="ch-title-en">${ch.titleEnglish}</div>
     </div>` +
    ch.sections.map((s,i) => renderSection(s,i)).join('');

  // open first section by default
  const fh = el.querySelector('.sec-hdr');
  if (fh) toggle(fh);
}

function renderSection(s, idx) {
  let body = '';
  if      (s.type==='vocab')    body = renderVocab(s.items);
  else if (s.type==='qa')       body = renderQA(s.items);
  else if (s.type==='fill')     body = renderFill(s.items);
  else if (s.type==='wordform') body = renderWordForm(s.items);

  return `
  <div class="sec-card" style="animation-delay:${idx*.07}s">
    <div class="sec-hdr" onclick="toggle(this)">
      <div class="sec-icon ${s.iconClass}">${s.icon}</div>
      <div class="sec-titles">
        <div class="sec-title-kn">${s.titleKn}</div>
        <div class="sec-title-en">${s.titleEn}</div>
      </div>
      <div class="sec-count">${s.items.length} items</div>
      <div class="sec-chevron">▼</div>
    </div>
    <div class="sec-body">${body}</div>
  </div>`;
}

function toggle(hdr) {
  hdr.classList.toggle('open');
  hdr.nextElementSibling.classList.toggle('open');
}

/* ── Vocab ── */
function renderVocab(items) {
  return `<div class="vocab-grid">${items.map((it,i) => {
    const r = mkRef(it.kn);
    return `
    <div class="vocab-card" id="${r}_c">
      <div class="vocab-top">
        <div class="vocab-num">Word ${i+1}</div>
        <button class="speak-btn" id="${r}_b" onclick="go('${r}')">🔊 Speak</button>
      </div>
      <div class="vocab-kn">${it.kn}</div>
      <div class="vocab-tr">${it.tr}</div>
      <span class="vocab-en">${it.en}</span>
    </div>`;
  }).join('')}</div>`;
}

/* ── Q & A ── */
function renderQA(items) {
  return items.map((it,i) => {
    const q = mkRef(it.qKn);
    const a = mkRef(it.aKn);
    return `
    <div class="qa-item" id="${q}_c">
      <div class="qa-q-block">
        <div class="qa-q-top">
          <div class="qa-q-label">Question ${i+1}</div>
          <button class="speak-btn" id="${q}_b" onclick="go('${q}')">🔊 Speak Q</button>
        </div>
        <div class="qa-kn">${it.qKn}</div>
        <div class="qa-tr">${it.qTr}</div>
        <div class="qa-en">🔵 ${it.qEn}</div>
      </div>
      <div class="qa-a-block">
        <div class="qa-a-top">
          <div class="qa-a-label">✅ Answer</div>
          <button class="speak-btn" id="${a}_b" onclick="go('${a}')">🔊 Speak A</button>
        </div>
        <div class="qa-ans-kn">${it.aKn}</div>
        <div class="qa-ans-tr">${it.aTr}</div>
        <div class="qa-ans-en">${it.aEn}</div>
      </div>
    </div>`;
  }).join('');
}

/* ── Fill ── */
function renderFill(items) {
  return `<ul class="fill-list">${items.map((it,i) => {
    const r = mkRef(it.speakKn);
    return `
    <li class="fill-item" id="${r}_c">
      <div class="fill-num">${i+1}</div>
      <div class="fill-body">
        <div class="fill-top">
          <div class="fill-kn">${it.sentenceKn}</div>
          <button class="speak-btn" id="${r}_b" onclick="go('${r}')">🔊 Speak</button>
        </div>
        <div class="fill-tr">${it.tr}</div>
        <div class="fill-en">${it.en}</div>
      </div>
    </li>`;
  }).join('')}</ul>`;
}

/* ── Word Form ── */
function renderWordForm(items) {
  return `<div class="wf-grid">${items.map(it => {
    const r    = mkRef(it.speakKn);
    const disp = it.displayKn.replace(/<hl>(.*?)<\/hl>/g,
                   '<span class="wf-hl">$1</span>');
    return `
    <div class="wf-card" id="${r}_c">
      <button class="speak-btn wf-speak" id="${r}_b" onclick="go('${r}')">🔊</button>
      <div class="wf-word">${disp}</div>
      <div class="wf-tr">${it.tr}</div>
      <span class="wf-mean">${it.en}</span>
    </div>`;
  }).join('')}</div>`;
}

/* ── Dispatcher ── */
function go(r) {
  const text = REFS[r];
  const btn  = document.getElementById(r+'_b');
  const card = document.getElementById(r+'_c');
  if (text && btn) speakKannada(text, btn, card);
}

}

renderContent();
