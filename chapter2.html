        {

        {

        },

          speakKn:  'ಹಣ್ಣನ್ನು ಫಲದವ',

function speakHeroTitle() {
  const btn = document.getElementById('heroSpeakBtn');
  if (btn) speakKannada(CHAPTER.titleKannada, btn, null,
    window.innerWidth/2, window.innerHeight/2);
}

/* ── Render (identical pattern to chapter1.html) ─────── */
const REFS = {};
let   refN = 0;
const mkRef = t => { const id='r'+(refN++); REFS[id]=t; return id; };

function renderChapter() {
  const ch    = CHAPTER;
  document.getElementById('chapterContent').innerHTML =
    `<div class="ch-hero">
       <div class="ch-hero-emoji">${ch.emoji}</div>
       <div class="ch-num">${ch.number}</div>
       <div class="ch-kn" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
         ${ch.titleKannada}
         <button id="heroSpeakBtn"
           onclick="speakHeroTitle()"
           style="background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 12px;font-size:.74rem;font-weight:800;color:white;cursor:pointer;flex-shrink:0;">
           🔊 Speak
         </button>
       </div>
       <div style="font-size:.85rem;color:rgba(255,255,255,.65);font-style:italic;margin-top:2px;">${ch.titleTranslit}</div>
       <div class="ch-en">${ch.titleEnglish}</div>
       <div class="ch-progress">
         <div class="ch-progress-bar"><div class="ch-progress-fill" id="progressFill" style="width:0%"></div></div>
         <div class="ch-progress-label" id="progressLabel">0% heard today</div>
       </div>
     </div>` +
    ch.sections.map((s,i) => renderSection(s,i)).join('');
  const fh = document.querySelector('.sec-hdr');
  if (fh) toggle(fh);
}

function renderSection(s, idx) {
  let body='';
  if      (s.type==='vocab')    body=renderVocab(s.items);
  else if (s.type==='qa')       body=renderQA(s.items);
  else if (s.type==='fill')     body=renderFill(s.items);
  else if (s.type==='wordform') body=renderWordForm(s.items);
  return `
  <div class="sec-card" style="animation-delay:${idx*.08}s">
    <div class="sec-hdr" onclick="toggle(this)">
      <div class="sec-icon-wrap ${s.iconClass}">${s.icon}</div>
      <div class="sec-titles"><div class="sec-title-kn">${s.titleKn}</div><div class="sec-title-en">${s.titleEn}</div></div>
      <div class="sec-count">${s.items.length} items</div>
      <div class="sec-chevron">▼</div>
    </div>
    <div class="sec-body">${body}</div>
  </div>`;
}

function toggle(hdr) { hdr.classList.toggle('open'); hdr.nextElementSibling.classList.toggle('open'); }

function renderVocab(items) {
  return `<div class="vocab-grid">${items.map((it,i)=>{
    const r=mkRef(it.kn);
    return `<div class="vocab-card" id="${r}_c">
      <div class="vocab-top"><div class="vocab-num">Word ${i+1}</div><button class="speak-btn" id="${r}_b" onclick="go('${r}',event)">🔊 Speak</button></div>
      <div class="vocab-kn">${it.kn}</div><div class="vocab-tr">${it.tr}</div><span class="vocab-en">${it.en}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderQA(items) {
  return items.map((it,i)=>{
    const q=mkRef(it.qKn), a=mkRef(it.aKn);
    return `<div class="qa-item" id="${q}_c">
      <div class="qa-q-block"><div class="qa-q-top"><div class="qa-q-label">❓ Q${i+1}</div><button class="speak-btn" id="${q}_b" onclick="go('${q}',event)">🔊 Q</button></div>
        <div class="qa-kn">${it.qKn}</div><div class="qa-tr">${it.qTr}</div><div class="qa-en">🔵 ${it.qEn}</div></div>
      <div class="qa-a-block"><div class="qa-a-top"><div class="qa-a-label">✅ Answer</div><button class="speak-btn" id="${a}_b" onclick="go('${a}',event)">🔊 A</button></div>
        <div class="qa-ans-kn">${it.aKn}</div><div class="qa-ans-tr">${it.aTr}</div><div class="qa-ans-en">🟢 ${it.aEn}</div></div>
    </div>`;
  }).join('');
}

function renderFill(items) {
  return `<ul class="fill-list">${items.map((it,i)=>{
    const r=mkRef(it.speakKn);
    return `<li class="fill-item" id="${r}_c"><div class="fill-num">${i+1}</div><div class="fill-body">
      <div class="fill-top"><div class="fill-kn">${it.sentenceKn}</div><button class="speak-btn" id="${r}_b" onclick="go('${r}',event)">🔊 Speak</button></div>
      <div class="fill-tr">${it.tr}</div><div class="fill-en">${it.en}</div></div></li>`;
  }).join('')}</ul>`;
}

function renderWordForm(items) {
  return `<div class="wf-grid">${items.map(it=>{
    const r=mkRef(it.speakKn);
    const disp=it.displayKn.replace(/<hl>(.*?)<\/hl>/g,'<span class="wf-hl">$1</span>');
    return `<div class="wf-card" id="${r}_c"><button class="speak-btn wf-speak" id="${r}_b" onclick="go('${r}',event)">🔊</button>
      <div class="wf-word">${disp}</div><div class="wf-tr">${it.tr}</div><span class="wf-mean">${it.en}</span></div>`;
  }).join('')}</div>`;
}

function go(r, evt) {
  const text=REFS[r], btn=document.getElementById(r+'_b'), card=document.getElementById(r+'_c');
  if (text && btn) {
    markHeard(CHAPTER.id+':'+r);
    const total=CHAPTER.sections.reduce((s,sec)=>s+sec.items.length,0);
    updateProgress(CHAPTER.id, total);
    speakKannada(text, btn, card, evt?.clientX, evt?.clientY);
  }
}

(function(){
  const bg=document.getElementById('starsBg');
  const emojis=['⭐','🌟','✨','💫','🐒','🍌','🎯'];
  for(let i=0;i<15;i++){
    const s=document.createElement('div'); s.className='star-float';
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=Math.random()*100+'vw';
    s.style.animationDuration=(12+Math.random()*20)+'s';
    s.style.animationDelay=(-Math.random()*20)+'s';
    s.style.fontSize=(.8+Math.random()*.8)+'rem';
    bg.appendChild(s);
  }
})();

bootShared(() => {
  syncSpeakerDropdown();
  renderChapter();
});
</script>
